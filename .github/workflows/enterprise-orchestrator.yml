name: NodeJs
on:
   push: 
     branch: master

jobs:
  Build-Test:
   runs-on: ubuntu -latest

       steps:
        - name: checkout code
          uses: actions/checkout2v7

        - name: set up NodeJs
          uses: actions/setup-node@v6
          with:
           node-version: '24'

        - name: Build
          runs: npm install

        - name: test
          runs: npm test

        - name: Deploy
          runs: echo "code is deployed"
